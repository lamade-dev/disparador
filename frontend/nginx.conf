server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass https://disparador-disparador.kj2jgf.easypanel.host/api/;
        proxy_set_header Host disparador-disparador.kj2jgf.easypanel.host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    location /socket.io/ {
        proxy_pass https://disparador-disparador.kj2jgf.easypanel.host/socket.io/;
        proxy_set_header Host disparador-disparador.kj2jgf.easypanel.host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_ssl_server_name on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
